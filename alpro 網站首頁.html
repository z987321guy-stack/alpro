<script>
    // 導覽列捲動變色邏輯
    const navbar = document.getElementById('navbar');
    const logoText = document.getElementById('nav-logo-text');
    const navLinks = document.getElementById('nav-links');

    window.addEventListener('scroll', () => {
        if (window.scrollY > 50) {
            navbar.classList.add('nav-scrolled', 'py-4');
            navbar.classList.remove('py-6');
            logoText.classList.add('text-slate-900');
            logoText.classList.remove('text-white');
            navLinks.classList.add('text-slate-600');
            navLinks.classList.remove('text-slate-300');
        } else {
            navbar.classList.remove('nav-scrolled', 'py-4');
            navbar.classList.add('py-6');
            logoText.classList.add('text-white');
            logoText.classList.remove('text-slate-900');
            navLinks.classList.add('text-slate-300');
            navLinks.classList.remove('text-slate-600');
        }
    });

    // 行動版選單開關邏輯
    const mobileBtn = document.getElementById('mobile-menu-btn');
    mobileBtn.addEventListener('click', () => {
        alert("Mobile menu toggled");
    });
</script>
